<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070706"/>
      <stop offset="0.48" stop-color="#16140f"/>
      <stop offset="1" stop-color="#443c23"/>
    </linearGradient>
    <radialGradient id="warm" cx="74%" cy="18%" r="62%">
      <stop offset="0" stop-color="#8b7a3b" stop-opacity="0.34"/>
      <stop offset="0.52" stop-color="#4c3d16" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#warm)"/>
  <rect width="1200" height="630" filter="url(#softNoise)" opacity="0.28"/>
  <rect x="49" y="49" width="1102" height="532" fill="none" stroke="#cfc28a" stroke-width="2"/>

  <text x="91" y="135" fill="#d0c58f" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="2">
    GAP COMMUNITY KOREA
  </text>
  <text x="91" y="244" fill="#f6f4ef" font-family="Times New Roman, Georgia, serif" font-size="88">
    Reveal
  </text>
  <text x="96" y="316" fill="#d4c890" font-family="Arial, Helvetica, sans-serif" font-size="38" letter-spacing="1">
    2026. 8. 7 - 8. 9 · Seoul
  </text>
  <text x="94" y="383" fill="#d6d2c7" font-family="Apple SD Gothic Neo, AppleGothic, Noto Sans CJK KR, sans-serif" font-size="30">
    <tspan x="94" dy="0">삶의 반복 패턴을 발견하고,</tspan>
    <tspan x="94" dy="41">진짜 비전으로 다시 정렬하는 3일</tspan>
  </text>

  <rect x="1012" y="156" width="57" height="57" transform="rotate(45 1040.5 184.5)" fill="#cec48c"/>
  <rect x="1028" y="269" width="30" height="30" transform="rotate(45 1043 284)" fill="#ffffff"/>
</svg>
